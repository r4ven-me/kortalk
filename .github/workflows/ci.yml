name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Системные библиотеки Qt (offscreen-рендер)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1
      - name: Установка пакета и зависимостей
        run: pip install -e '.[test]' ruff
      - name: Линтер
        run: ruff check .
      - name: Тесты
        run: pytest -v
        env:
          QT_QPA_PLATFORM: offscreen
